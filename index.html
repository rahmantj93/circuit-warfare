<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Circuit Warfare</title>

  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>

  <!-- MAIN MENU -->
  <section id="main-menu" class="screen">
    <h1>Circuit Warfare</h1>
    <button id="startBtn">Start Game</button>
    <button id="continueBtn">Continue</button>
    <button id="howToPlayBtn">How to Play</button>
  </section>

  <!-- STORY SCREEN -->
  <section id="story-screen" class="screen hidden">
    <div id="story-panel">
      <div id="story-text">[Story text will appear here]</div>
    </div>

    <div id="choice-buttons" class="choices"></div>
    <button id="continueStoryBtn" class="hidden">Continue</button>
  </section>

  <!-- COMBAT SCREEN -->
  <section id="combat-screen" class="screen hidden combat-normal">
    <h2>Combat Screen</h2>

    <!-- Spark effect -->
    <div id="spark"></div>

    <div id="combat-container">

      <!-- LEFT SIDE: HUD + Buttons -->
      <div id="combat-left">
        <div id="enemy-info"></div>
        <div id="player-info"></div>

        <div id="combat-buttons">
          <button id="attackBtn">Attack</button>
          <button id="defendBtn">Defend</button>
          <button id="specialBtn">Special</button>
          <button id="itemBtn">Item</button>
        </div>
      </div>

      <!-- RIGHT SIDE: Scrollable Log -->
      <div id="combat-log-container">
        <div id="combat-log"></div>
      </div>

    </div>

</section>

  <!-- OUTCOME SCREEN -->
  <section id="outcome-screen" class="screen hidden">
    <h2 id="outcome-title"></h2>
    <button id="continueAfterBattle">Continue</button>
    <button id="retryBtn">Retry</button>
    <button id="menuBtn">Main Menu</button>
  </section>

</body>
</html>
